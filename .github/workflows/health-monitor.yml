name: AADS Health Monitor (L4)
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Health Check
        run: |
          HC=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            "https://aads.newtalk.kr/api/v1/ops/health-check")
          echo "Health check HTTP: $HC"
          if [ "$HC" != "200" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TG_CHAT_ID }}" \
              -d text="🚨 [L4-EXTERNAL] AADS health-check FAILED (HTTP $HC) - Fri Mar  6 01:40:49 PM UTC 2026"
            exit 1
          fi
