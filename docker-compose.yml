version: '3.9'
services:
  aads-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aads-dashboard
    restart: always
    ports:
      - '3100:3100'
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://aads.newtalk.kr/api/v1
      - PORT=3100
      - TZ=Asia/Seoul
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://$(hostname -i):3100 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - aads_network

networks:
  aads_network:
    external: true
